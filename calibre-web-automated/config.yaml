---
name: Calibre-Web Automated
version: "4.0.6.8"
# version: "dev"
slug: calibre-web-automated
description: Self-hosted ebook library with automatic ingest, conversion, and metadata
url: https://github.com/Cdower/hassio-addons/tree/main/calibre-web-automated
arch:
  - amd64
  - aarch64
init: false
webui: "http://[HOST]:[PORT:8083]/"
ports:
  "8083/tcp": 8083
ports_description:
  "8083/tcp": Web UI
map:
  - share:rw
  - media:rw
privileged:
  - SYS_ADMIN
apparmor: false
image: ghcr.io/cdower/{arch}-hassio-addon-calibre-web-automated
options:
  library_path: /share/calibre/calibre-library
  ingest_path: /share/calibre/cwa-book-ingest
  config_path: /share/calibre/config
  plugins_path: /share/calibre/plugins
  network_share_mode: false
  hardcover_token: ""
  trusted_proxy_count: 1
  log_level: info
  tailscale_enabled: false
  tailscale_hostname: calibre
  tailscale_authkey: ""
  tailscale_serve: both
schema:
  library_path: str
  ingest_path: str
  config_path: str?
  plugins_path: str?
  network_share_mode: bool
  hardcover_token: password?
  trusted_proxy_count: int(1,10)
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
  tailscale_enabled: bool
  tailscale_hostname: str
  tailscale_authkey: password?
  tailscale_serve: list(none|http|https|both)
backup_exclude:
  - "*/cwa.log"
  - "*/processed_books/*"
